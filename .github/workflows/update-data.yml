name: Update predictor data

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rebuild data.json from latest results
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node update-data.js

      - name: Commit data.json if it changed
        run: |
          git config user.name  "wc2026-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No change — nothing to commit."
          else
            git commit -m "data: auto-update $(date -u +%FT%TZ)"
            git push
          fi
